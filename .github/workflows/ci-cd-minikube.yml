name: CI/CD with Azure VM Minikube

on:
  push:
    branches: [ develop ]

  pull_request:
    branches: [ develop, master ]

  workflow_dispatch:

env:
  IMAGE_NAME: credit-risk-api
  STREAMLIT_IMAGE_NAME: credit-risk-streamlit
  ACR_LOGIN_SERVER: creditriskacrguetch.azurecr.io

jobs:
  ci-k8s:
    runs-on: [self-hosted, Linux, X64, credit-risk-scoring]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python pip
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-venv

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: |
          . .venv/bin/activate
          python3 src/train.py

      - name: Evaluate model
        run: |
          . .venv/bin/activate
          python3 src/evaluate.py

      - name: Generate SHAP report
        run: |
          . .venv/bin/activate
          python3 src/explain.py

      - name: Run tests
        run: |
          . .venv/bin/activate
          export PYTHONPATH=$PWD
          pytest tests/

      - name: Upload model and reports
        uses: actions/upload-artifact@v4
        with:
          name: model-and-reports
          path: |
            models/*.pkl
            reports/*.png
            reports/*.csv

  deploy:
    needs: ci-k8s
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: [self-hosted, Linux, X64, credit-risk-scoring]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Ensure Minikube is running
        run: |
          if ! minikube status | grep -q "Running"; then
            minikube start --driver=docker
          else
            echo "Minikube already running"
          fi

      - name: Wait for Kubernetes
        run: |
          kubectl wait --for=condition=Ready nodes --all --timeout=120s

      - name: Login to Azure Container Registry
        run: |
          az acr login --name creditriskacrguetch

      - name: Download model and reports
        uses: actions/download-artifact@v4
        with:
          name: model-and-reports
          path: .


      - name: Check downloaded files
        run: |
          ls -lah
          ls -lah models || true
          ls -lah reports || true

      - name: Build and push Docker image to ACR
        run: |
          docker build -f Dockerfile.api -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG .
          docker tag $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG $ACR_LOGIN_SERVER/$IMAGE_NAME:latest
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Build and push Streamlit image to ACR
        run: |
          ACR_LOGIN_SERVER=creditriskacrguetch.azurecr.io
          docker build -f Dockerfile.streamlit -t $ACR_LOGIN_SERVER/$STREAMLIT_IMAGE_NAME:$IMAGE_TAG .
          docker tag $ACR_LOGIN_SERVER/$STREAMLIT_IMAGE_NAME:$IMAGE_TAG $ACR_LOGIN_SERVER/$STREAMLIT_IMAGE_NAME:latest
          docker push $ACR_LOGIN_SERVER/$STREAMLIT_IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_LOGIN_SERVER/$STREAMLIT_IMAGE_NAME:latest

      - name: Deploy to Kubernetes
        run: |
          sed "s|IMAGE_PLACEHOLDER|$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG|g" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/credit-risk-api --timeout=300s


      - name: Deploy Streamlit to Kubernetes
        run: |
          ACR_LOGIN_SERVER=creditriskacrguetch.azurecr.io
          sed "s|STREAMLIT_IMAGE_PLACEHOLDER|$ACR_LOGIN_SERVER/$STREAMLIT_IMAGE_NAME:$IMAGE_TAG|g" k8s/streamlit-deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/streamlit-service.yaml
          kubectl rollout status deployment/credit-risk-streamlit --timeout=300s

      - name: Test API Kubernetes
        run: |
          pkill -f "kubectl port-forward" || true
          kubectl port-forward service/credit-risk-service 8000:80 --address 127.0.0.1 &
          sleep 15
          curl -v -f http://127.0.0.1:8000/health

      - name: Debug Kubernetes on failure
        if: failure()
        run: |
          hostname
          whoami
          docker ps
          kubectl get pods
          kubectl describe deployment credit-risk-api
          kubectl get events --sort-by=.metadata.creationTimestamp | tail -40
          kubectl get svc credit-risk-service -o yaml
          kubectl get endpoints credit-risk-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-risk-streamlit
  spec:
  replicas: 1
  selector:
    matchLabels:
      app: credit-risk-streamlit
    template:
      metadata:
        labels:
          app: credit-risk-streamlit
      spec:
        containers:
        - name: streamlit
          image: STREAMLIT_IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
          - containerPort: 8501

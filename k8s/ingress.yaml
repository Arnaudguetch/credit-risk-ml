apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: credit-risk-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: api.credit-risk.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: credit-risk-service
            port:
              number: 80
